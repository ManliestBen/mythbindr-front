# Netlify build config for the MythBindr frontend (this repo is frontend-only).
# The Express/Socket.IO backend is a separate repo (mythbindr-back), deployed
# on a Raspberry Pi. API calls on the deployed site won't work until that
# backend is reachable + proxied here.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: let React Router handle client-side routes.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# When the backend is reachable, uncomment and point this at it so /api proxies
# through the same origin (keeps session cookies first-party):
# [[redirects]]
#   from = "/api/*"
#   to = "https://<your-pi-domain>/api/:splat"
#   status = 200
#   force = true
