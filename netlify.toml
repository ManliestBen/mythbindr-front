# Netlify build config for the MythBindr client (frontend only).
# The Express/Socket.IO backend deploys separately (see PLAN.md §8); API calls
# on the deployed site won't work until that backend is live + proxied here.

[build]
  base = "client"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: let React Router handle client-side routes.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# When the backend is deployed, uncomment and point this at its URL so /api
# and websocket traffic proxy through the same origin:
# [[redirects]]
#   from = "/api/*"
#   to = "https://<your-api-host>/api/:splat"
#   status = 200
#   force = true
